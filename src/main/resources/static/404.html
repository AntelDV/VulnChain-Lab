<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v4nD Tech - 404</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #FFF8F0;
            background-image:
                    radial-gradient(circle at 20% 20%, rgba(254,215,170,0.5) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(186,230,253,0.5) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }

        .pixel-404 {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(72px, 20vw, 160px);
            color: #F97316;
            line-height: 1;
            text-shadow:
                    6px 6px 0 #C2410C,
                    12px 12px 0 rgba(194,65,12,0.2);
            animation: glitch 3s infinite;
        }

        .pixel-sub {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(12px, 3.5vw, 22px);
            color: #64748B;
            letter-spacing: 4px;
        }

        @keyframes glitch {
            0%, 88%, 100% { transform: translate(0); filter: none; }
            90% { transform: translate(-4px, 2px); color: #38BDF8; filter: blur(1px); }
            92% { transform: translate(4px, -2px); color: #F97316; filter: none; }
            94% { transform: translate(-3px, 3px); }
            96% { transform: translate(3px, -3px); color: #38BDF8; }
            98% { transform: translate(0); color: #F97316; }
        }
    </style>
</head>
<body>
<div class="pixel-404">404</div>
<div class="pixel-sub">PAGE_NOT_FOUND</div>
</body>
</html>
