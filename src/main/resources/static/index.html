<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnChain Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0D1117;
            --surface: #161B22;
            --border:  #30363D;
            --accent:  #F78166;
            --text:    #E6EDF3;
            --muted:   #8B949E;
            --success: #3FB950;
            --danger:  #F85149;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Header badge */
        .lab-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(247,129,102,0.1);
            border: 1px solid rgba(247,129,102,0.3);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 999px;
            margin-bottom: 24px;
            letter-spacing: 0.08em;
        }
        .lab-badge::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        h1 span { color: var(--accent); }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '//';
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
        }

        /* Form */
        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        input::placeholder { color: var(--muted); }

        /* Button */
        .btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Alert */
        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            font-family: 'JetBrains Mono', monospace;
        }
        .alert.error {
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.3);
            color: var(--danger);
            display: block;
        }
        .alert.success {
            background: rgba(63,185,80,0.1);
            border: 1px solid rgba(63,185,80,0.3);
            color: var(--success);
            display: block;
        }

        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 24px 0;
        }

        /* Quick login hints */
        .hint-title {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }
        .hint-row {
            display: flex;
            gap: 8px;
        }
        .hint-btn {
            flex: 1;
            padding: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .hint-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Footer */
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="lab-badge">VULNERABLE LAB · EDUCATIONAL USE ONLY</div>

<h1>Vuln<span>Chain</span> Lab</h1>
<p class="subtitle">API Exploit Chain · IDOR → Auth Bypass → RCE</p>

<div class="card">
    <div class="card-title">Authentication</div>

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="off"/>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password"/>
    </div>

    <button class="btn btn-primary" id="loginBtn" onclick="login()">
        Sign In
    </button>

    <div class="alert" id="alert"></div>

    <hr class="divider">

    <div class="hint-title">Quick login</div>
    <div class="hint-row">
        <div class="hint-btn" onclick="fillCredentials('admin','admin123')">
            admin / admin123
        </div>
        <div class="hint-btn" onclick="fillCredentials('duong','duong123')">
            duong / duong123
        </div>
    </div>
</div>

<div class="footer">
    VulnChain-Lab · Spring Boot 4.x · Java 25
</div>

<script>
    function fillCredentials(user, pass) {
        document.getElementById('username').value = user;
        document.getElementById('password').value = pass;
    }

    async function login() {
        const btn = document.getElementById('loginBtn');
        const alert = document.getElementById('alert');
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
            showAlert('Username and password are required', 'error');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Authenticating...';
        alert.className = 'alert';

        try {
            const resp = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await resp.json();

            if (resp.ok) {
                // Save token + user info
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('role', data.role);

                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 800);
            } else {
                showAlert(data.message || 'Invalid credentials', 'error');
            }

        } catch (err) {
            showAlert('Connection error', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }

    function showAlert(msg, type) {
        const el = document.getElementById('alert');
        el.textContent = msg;
        el.className = `alert ${type}`;
    }

    // Enter key support
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });
</script>

</body>
</html>
